<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostNodes - Network Status</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #020617;
            --card-bg: rgba(15, 23, 42, 0.65); /* Matches main site translucency */
            --primary-blue: #2563eb;
            --primary-hover: #1d4ed8;
            --accent-cyan: #06b6d4;
            --status-green: #22c55e;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --border-color: rgba(51, 65, 85, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            line-height: 1.5;
            position: relative;
            min-height: 100vh;
        }

        /* --- PRELOADER SCREEN --- */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(6, 182, 212, 0.1);
            border-radius: 50%;
            border-top-color: var(--accent-cyan);
            animation: spin 1s cubic-bezier(0.55, 0.055, 0.675, 0.19) infinite;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.3);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .fade-out {
            opacity: 0;
            visibility: hidden;
        }

        /* --- BACKGROUND SYSTEM --- */
        .bg-animation-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            background-image: url('https://cdn.magicdecor.in/com/2023/02/29184224/image-1689504354-3016.jpg'); 
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-color: rgba(2, 6, 23, 0.75); 
            background-blend-mode: multiply; 
        }

        /* --- Header Section --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            position: relative;
            z-index: 10;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            text-shadow: 0 0 20px rgba(37, 99, 235, 0.5);
        }

        .logo span {
            color: var(--primary-blue);
        }

        .back-btn {
            background: rgba(17, 24, 39, 0.4);
            border: 1px solid var(--border-color);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            backdrop-filter: blur(8px);
            transition: background 0.3s, transform 0.2s;
        }

        .back-btn:hover {
            background: rgba(31, 41, 55, 0.6);
            transform: translateY(-2px);
        }

        /* --- Status Container --- */
        .status-container {
            max-width: 1000px;
            margin: 60px auto 100px auto;
            padding: 0 20px;
        }

        .global-banner {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
            backdrop-filter: blur(8px);
        }

        .pulse-dot {
            width: 12px;
            height: 12px;
            background-color: var(--status-green);
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7);
            animation: pulse 1.6s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        .global-banner h2 {
            font-size: 18px;
            font-weight: 700;
            color: #4ade80;
        }

        /* --- Node Card Layout --- */
        .node-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 32px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .node-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .node-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .node-title h3 {
            font-size: 22px;
            font-weight: 700;
        }

        .flag-icon {
            font-size: 20px;
        }

        .operational-badge {
            background: rgba(34, 197, 94, 0.15);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.3);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* --- Uptime Graphic Bars --- */
        .uptime-section {
            margin-bottom: 32px;
        }

        .uptime-bar-container {
            display: flex;
            gap: 4px;
            margin-bottom: 12px;
        }

        .uptime-pill {
            flex: 1;
            height: 28px;
            background-color: var(--status-green);
            border-radius: 3px;
            transition: opacity 0.2s;
            box-shadow: 0 2px 6px rgba(34, 197, 94, 0.2);
        }

        .uptime-pill:hover {
            opacity: 0.8;
            cursor: pointer;
        }

        .uptime-labels {
            display: flex;
            justify-content: space-between;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 500;
        }

        /* --- Live Metrics Metrics Grid --- */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 24px;
        }

        .metric-box {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            padding: 16px;
        }

        .metric-box label {
            display: block;
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .metric-value {
            font-size: 18px;
            font-weight: 700;
            color: white;
            display: flex;
            align-items: baseline;
            gap: 4px;
        }

        .metric-value span {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
        }

        @media (max-width: 600px) {
            .node-card { padding: 20px; }
            .metrics-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <div id="preloader">
        <div class="spinner"></div>
    </div>

    <div class="bg-animation-layer"></div>

    <header>
        <a href="https://home.ghostsmc.in/" class="logo">☁️ Ghost<span>Nodes</span></a>
        <a href="https://home.ghostsmc.in/" class="back-btn">← Back to Site</a>
    </header>

    <main class="status-container">
        
        <div class="global-banner">
            <div class="pulse-dot"></div>
            <h2>All Services Are Operational</h2>
        </div>

        <div class="node-card">
            <div class="node-header">
                <div class="node-title">
                    <span class="flag-icon">🇮🇳</span>
                    <h3>Indian Node</h3>
                </div>
                <div class="operational-badge">Operational</div>
            </div>

            <div class="uptime-section">
                <div class="uptime-bar-container">
                    <div class="uptime-pill" title="100% operational"></div>
                    <div class="uptime-pill" title="100% operational"></div>
                    <div class="uptime-pill" title="100% operational"></div>
                    <div class="uptime-pill" title="100% operational"></div>
                    <div class="uptime-pill" title="100% operational"></div>
                    <div class="uptime-pill" title="100% operational"></div>
                    <div class="uptime-pill" title="100% operational"></div>
                    <div class="uptime-pill" title="100% operational"></div>
                    <div class="uptime-pill" title="100% operational"></div>
                    <div class="uptime-pill" title="100% operational"></div>
                    <div class="uptime-pill" title="100% operational"></div>
                    <div class="uptime-pill" title="100% operational"></div>
                    <div class="uptime-pill" title="100% operational"></div>
                    <div class="uptime-pill" title="100% operational"></div>
                    <div class="uptime-pill" title="100% operational"></div>
                    <div class="uptime-pill" title="100% operational"></div>
                    <div class="uptime-pill" title="100% operational"></div>
                    <div class="uptime-pill" title="100% operational"></div>
                    <div class="uptime-pill" title="100% operational"></div>
                    <div class="uptime-pill" title="100% operational"></div>
                    <div class="uptime-pill" title="100% operational"></div>
                    <div class="uptime-pill" title="100% operational"></div>
                    <div class="uptime-pill" title="100% operational"></div>
                    <div class="uptime-pill" title="100% operational"></div>
                    <div class="uptime-pill" title="100% operational"></div>
                    <div class="uptime-pill" title="100% operational"></div>
                    <div class="uptime-pill" title="100% operational"></div>
                    <div class="uptime-pill" title="100% operational"></div>
                    <div class="uptime-pill" title="100% operational"></div>
                    <div class="uptime-pill" title="100% operational"></div>
                </div>
                <div class="uptime-labels">
                    <span>30 Days Ago</span>
                    <span style="color: #4ade80; font-weight: 700;">100.0% Uptime</span>
                    <span>Today</span>
                </div>
            </div>

            <div class="metrics-grid">
                <div class="metric-box">
                    <label>CPU Usage</label>
                    <div class="metric-value" id="nodeCpu">24.2<span>%</span></div>
                </div>
                <div class="metric-box">
                    <label>RAM Allocated</label>
                    <div class="metric-value" id="nodeRam">16<span>/ 64 GB</span></div>
                </div>
                <div class="metric-box">
                    <label>Disk NVMe</label>
                    <div class="metric-value" id="nodeDisk">20<span>/ 200 GB</span></div>
                </div>
                <div class="metric-box">
                    <label>Network Link</label>
                    <div class="metric-value" id="nodeNet">1.1<span>Gbps</span></div>
                </div>
            </div>
        </div>

    </main>

    <script>
        // Smooth Preloader Fadeout Handler
        window.addEventListener('load', function() {
            const preloader = document.getElementById('preloader');
            setTimeout(() => {
                preloader.classList.add('fade-out');
            }, 500);
        });

        // Simulates slight node variations every couple seconds so resource tracking looks real
        setInterval(() => {
            const cpuElement = document.getElementById('nodeCpu');
            const netElement = document.getElementById('nodeNet');
            
            // Random fluctuations around standard operational averages
            const randomCpu = (20 + Math.random() * 15).toFixed(1);
            const randomNet = (0.8 + Math.random() * 0.5).toFixed(1);

            cpuElement.innerHTML = `${randomCpu}<span>%</span>`;
            netElement.innerHTML = `${randomNet}<span>Gbps</span>`;
        }, 3000);
    </script>
</body>
</html>
